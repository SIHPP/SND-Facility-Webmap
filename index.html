<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script src="js/proj4.js"></script>
        <script src="js/proj4leaflet.js"></script>
        <script src="data/Sindhpopulation_1.js"></script>
        <script src="data/Sindhdistricts_2.js"></script>
        <script src="data/Healthfacilities_3.js"></script>
        <script>
        var crs = new L.Proj.CRS('EPSG:3857', '+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs', {
            resolutions: [2800, 1400, 700, 350, 175, 84, 42, 21, 11.2, 5.6, 2.8, 1.4, 0.7, 0.35, 0.14, 0.07],
        });
        var map = L.map('map', {
            crs: crs,
            continuousWorld: false,
            worldCopyJump: false, 
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[22.79467938893123,64.26036720152854],[30.760947213626668,75.71804500971113]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleMaps_0');
        map.getPane('pane_GoogleMaps_0').style.zIndex = 400;
        var layer_GoogleMaps_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleMaps_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_GoogleMaps_0;
        map.addLayer(layer_GoogleMaps_0);
        function pop_Sindhpopulation_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['VALUE'] !== null ? autolinker.link(feature.properties['VALUE'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Sindhpopulation_1_0(feature) {
            if (feature.properties['VALUE'] >= 1.000000 && feature.properties['VALUE'] <= 21.000000 ) {
                return {
                pane: 'pane_Sindhpopulation_1',
                opacity: 1,
                color: 'rgba(35,35,35,0.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(255,255,178,0.5019607843137255)',
                interactive: false,
            }
            }
            if (feature.properties['VALUE'] >= 21.000000 && feature.properties['VALUE'] <= 68.000000 ) {
                return {
                pane: 'pane_Sindhpopulation_1',
                opacity: 1,
                color: 'rgba(35,35,35,0.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(254,203,91,0.5019607843137255)',
                interactive: false,
            }
            }
            if (feature.properties['VALUE'] >= 68.000000 && feature.properties['VALUE'] <= 161.000000 ) {
                return {
                pane: 'pane_Sindhpopulation_1',
                opacity: 1,
                color: 'rgba(35,35,35,0.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(253,141,60,0.5019607843137255)',
                interactive: false,
            }
            }
            if (feature.properties['VALUE'] >= 161.000000 && feature.properties['VALUE'] <= 369.000000 ) {
                return {
                pane: 'pane_Sindhpopulation_1',
                opacity: 1,
                color: 'rgba(35,35,35,0.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(240,59,32,0.5019607843137255)',
                interactive: false,
            }
            }
            if (feature.properties['VALUE'] >= 369.000000 && feature.properties['VALUE'] <= 116766.000000 ) {
                return {
                pane: 'pane_Sindhpopulation_1',
                opacity: 1,
                color: 'rgba(35,35,35,0.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(189,0,38,0.5019607843137255)',
                interactive: false,
            }
            }
        }
        map.createPane('pane_Sindhpopulation_1');
        map.getPane('pane_Sindhpopulation_1').style.zIndex = 401;
        map.getPane('pane_Sindhpopulation_1').style['mix-blend-mode'] = 'normal';
        var layer_Sindhpopulation_1 = new L.geoJson(json_Sindhpopulation_1, {
            attribution: '',
            interactive: false,
            dataVar: 'json_Sindhpopulation_1',
            layerName: 'layer_Sindhpopulation_1',
            pane: 'pane_Sindhpopulation_1',
            onEachFeature: pop_Sindhpopulation_1,
            style: style_Sindhpopulation_1_0,
        });
        bounds_group.addLayer(layer_Sindhpopulation_1);
        map.addLayer(layer_Sindhpopulation_1);
        function pop_Sindhdistricts_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['OBJECTID'] !== null ? autolinker.link(feature.properties['OBJECTID'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['WHO_PROV_N'] !== null ? autolinker.link(feature.properties['WHO_PROV_N'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['WHO_PROV_C'] !== null ? autolinker.link(feature.properties['WHO_PROV_C'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['WHO_DIST_N'] !== null ? autolinker.link(feature.properties['WHO_DIST_N'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['WHO_DIST_C'] !== null ? autolinker.link(feature.properties['WHO_DIST_C'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Shape_Le_1'] !== null ? autolinker.link(feature.properties['Shape_Le_1'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['Shape_Area'] !== null ? autolinker.link(feature.properties['Shape_Area'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Sindhdistricts_2_0() {
            return {
                pane: 'pane_Sindhdistricts_2',
                opacity: 1,
                color: 'rgba(0,0,0,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 2.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(231,113,72,0.0)',
                interactive: false,
            }
        }
        map.createPane('pane_Sindhdistricts_2');
        map.getPane('pane_Sindhdistricts_2').style.zIndex = 402;
        map.getPane('pane_Sindhdistricts_2').style['mix-blend-mode'] = 'normal';
        var layer_Sindhdistricts_2 = new L.geoJson(json_Sindhdistricts_2, {
            attribution: '',
            interactive: false,
            dataVar: 'json_Sindhdistricts_2',
            layerName: 'layer_Sindhdistricts_2',
            pane: 'pane_Sindhdistricts_2',
            onEachFeature: pop_Sindhdistricts_2,
            style: style_Sindhdistricts_2_0,
        });
        bounds_group.addLayer(layer_Sindhdistricts_2);
        map.addLayer(layer_Sindhdistricts_2);
        function pop_Healthfacilities_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Facility Code</th>\
                        <td>' + (feature.properties['Facility Code'] !== null ? autolinker.link(feature.properties['Facility Code'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">District</th>\
                        <td>' + (feature.properties['District'] !== null ? autolinker.link(feature.properties['District'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Facility Name</th>\
                        <td>' + (feature.properties['Facility Name'] !== null ? autolinker.link(feature.properties['Facility Name'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Facility Type</th>\
                        <td>' + (feature.properties['Facility Type'] !== null ? autolinker.link(feature.properties['Facility Type'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Managed By</th>\
                        <td>' + (feature.properties['Managed By'] !== null ? autolinker.link(feature.properties['Managed By'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Latitude</th>\
                        <td>' + (feature.properties['Latitude'] !== null ? autolinker.link(feature.properties['Latitude'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Longitude</th>\
                        <td>' + (feature.properties['Longitude'] !== null ? autolinker.link(feature.properties['Longitude'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Healthfacilities_3_0(feature) {
            switch(String(feature.properties['Managed By'])) {
                case 'DOH':
                    return {
                pane: 'pane_Healthfacilities_3',
                radius: 3.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(164,237,102,1.0)',
                interactive: true,
            }
                    break;
                case 'PPHI':
                    return {
                pane: 'pane_Healthfacilities_3',
                radius: 3.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(128,39,255,1.0)',
                interactive: true,
            }
                    break;
                case 'PWD':
                    return {
                pane: 'pane_Healthfacilities_3',
                radius: 3.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(178,197,246,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_Healthfacilities_3');
        map.getPane('pane_Healthfacilities_3').style.zIndex = 403;
        map.getPane('pane_Healthfacilities_3').style['mix-blend-mode'] = 'normal';
        var layer_Healthfacilities_3 = new L.geoJson(json_Healthfacilities_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Healthfacilities_3',
            layerName: 'layer_Healthfacilities_3',
            pane: 'pane_Healthfacilities_3',
            onEachFeature: pop_Healthfacilities_3,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_Healthfacilities_3_0(feature));
            },
        });
        bounds_group.addLayer(layer_Healthfacilities_3);
        map.addLayer(layer_Healthfacilities_3);
        var baseMaps = {};
        var overlaysTree = [
            {label: 'Health facilities<br /><table><tr><td style="text-align: center;"><img src="legend/Healthfacilities_3_DOH0.png" /></td><td>DOH</td></tr><tr><td style="text-align: center;"><img src="legend/Healthfacilities_3_PPHI1.png" /></td><td>PPHI</td></tr><tr><td style="text-align: center;"><img src="legend/Healthfacilities_3_PWD2.png" /></td><td>PWD</td></tr></table>', layer: layer_Healthfacilities_3},
            {label: '<img src="legend/Sindhdistricts_2.png" /> Sindh districts', layer: layer_Sindhdistricts_2},
            {label: 'Sindh population<br /><table><tr><td style="text-align: center;"><img src="legend/Sindhpopulation_1_1210.png" /></td><td>1 - 21</td></tr><tr><td style="text-align: center;"><img src="legend/Sindhpopulation_1_21681.png" /></td><td>21 - 68</td></tr><tr><td style="text-align: center;"><img src="legend/Sindhpopulation_1_681612.png" /></td><td>68 - 161</td></tr><tr><td style="text-align: center;"><img src="legend/Sindhpopulation_1_1613693.png" /></td><td>161 - 369</td></tr><tr><td style="text-align: center;"><img src="legend/Sindhpopulation_1_3691167664.png" /></td><td>369 - 116766</td></tr></table>', layer: layer_Sindhpopulation_1},
            {label: "Google Maps", layer: layer_GoogleMaps_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        var i = 0;
        layer_Sindhdistricts_2.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['WHO_DIST_N'] !== null?String('<div style="color: #000000; font-size: 12pt; font-weight: bold; font-family: \'DejaVu Sans\', sans-serif;">' + layer.feature.properties['WHO_DIST_N']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_Sindhdistricts_2'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        resetLabels([layer_Sindhdistricts_2]);
        map.on("zoomend", function(){
            resetLabels([layer_Sindhdistricts_2]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_Sindhdistricts_2]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_Sindhdistricts_2]);
        });
        </script>
    </body>
</html>
